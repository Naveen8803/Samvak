{% extends 'base.html' %}

{% block title %}Page Not Found - Samvak{% endblock %}

{% block content %}
<section class="page-view active">
  <div class="page-container" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div style="text-align: center; max-width: 640px;">
      <h1 class="hero-heading-new" style="font-size: clamp(2.2rem, 6vw, 3.2rem);">404</h1>
      <p style="color: #94a3b8; margin-top: 0.8rem;">The page you requested does not exist.</p>
      <div style="margin-top: 1.5rem; display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap;">
        <a href="{{ url_for('index') }}" class="btn-primary-new" style="text-decoration: none;">Go Home</a>
        <a href="{{ url_for('sign_to_text') }}" class="btn-secondary-new" style="text-decoration: none;">Live Translation</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block footer %}{% endblock %}
