<div class="bottom-taskbar">
    <div class="nav-indicator"></div>

    <a href="{{ url_for('index') }}"
        class="taskbar-nav-link{% if request.path == url_for('index') %} active{% endif %}">
        <i class="fas fa-home taskbar-icon"></i>
        <span class="taskbar-label">Home</span>
    </a>

    <a href="{{ url_for('sign_to_text') }}"
        class="taskbar-nav-link{% if request.path == url_for('sign_to_text') %} active{% endif %}">
        <i class="fas fa-hand-paper taskbar-icon"></i>
        <span class="taskbar-label">Sign</span>
    </a>

    <a href="{{ url_for('speech_to_sign') }}"
        class="taskbar-nav-link{% if request.path == url_for('speech_to_sign') %} active{% endif %}">
        <i class="fas fa-microphone taskbar-icon"></i>
        <span class="taskbar-label">Speech</span>
    </a>

    <a href="{{ url_for('learn') }}"
        class="taskbar-nav-link{% if request.path == url_for('learn') %} active{% endif %}">
        <i class="fas fa-book taskbar-icon"></i>
        <span class="taskbar-label">Learn</span>
    </a>

    <a href="{{ url_for('feedback') }}"
        class="taskbar-nav-link{% if request.path == url_for('feedback') %} active{% endif %}">
        <i class="fas fa-comment-dots taskbar-icon"></i>
        <span class="taskbar-label">Feedback</span>
    </a>
</div>
